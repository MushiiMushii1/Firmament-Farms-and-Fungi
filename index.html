<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firmament Farms & Fungi | Heirloom, Naturally-Grown Produce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --forest-green: #2D4A3E;
            --deep-green: #1A2F26;
            --warm-brown: #8B6F47;
            --dark-brown: #5C4A32;
            --cream: #F5F1E8;
            --beige: #E8E0D0;
            --soft-white: #FFFEF9;
            --accent-gold: #C9A962;
            --text-dark: #2C2C2C;
            --text-light: #6B6B6B;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--soft-white);
            color: var(--text-dark);
            line-height: 1.6;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            color: var(--forest-green);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 254, 249, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        nav.scrolled {
            padding: 0.75rem 5%;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.12);
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--forest-green);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--warm-brown);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--warm-brown);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--forest-green);
            cursor: pointer;
        }

        /* Hero - Improved sharpness */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 600px;
            background-image: url('https://res.cloudinary.com/fetch-ai/image/upload/v1777040072/b083ae0b-1ddc-4a35-8073-0a50ed8c9c16.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            image-rendering: -webkit-optimize-contrast;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(45, 74, 62, 0.78) 0%, rgba(26, 47, 38, 0.68) 50%, rgba(92, 74, 50, 0.58) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            color: var(--soft-white);
            padding: 2rem;
            max-width: 900px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--soft-white);
            text-shadow: 2px 2px 12px rgba(0, 0, 0, 0.4);
        }

        .hero .tagline {
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            color: var(--cream);
        }

        .hero-cta {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--warm-brown);
            color: var(--soft-white);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .hero-cta:hover {
            background: var(--dark-brown);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        /* Sections */
        section { padding: 5rem 5%; }
        .section-title { text-align: center; font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 1rem; color: var(--forest-green); }
        .section-subtitle { text-align: center; color: var(--text-light); font-size: 1.1rem; margin-bottom: 3rem; max-width: 600px; margin-left: auto; margin-right: auto; }

        .about { background: var(--cream); text-align: center; }

        .products { background: var(--soft-white); }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--soft-white);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            transition: all 0.4s ease;
            border: 1px solid var(--beige);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(45, 74, 62, 0.15);
        }

        .product-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--cream), var(--beige));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }

        /* Contact Section - Improved for mobile */
        .contact {
            background: linear-gradient(135deg, var(--forest-green), var(--deep-green));
            color: var(--soft-white);
        }

        .contact-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 3rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .contact-info {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 2.5rem;
        }

        .contact-info h3 {
            color: var(--soft-white);
            margin-bottom: 1.8rem;
        }

        .contact-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.6rem;
        }

        .contact-item a {
            color: #e8e0d0 !important;
            text-decoration: none;
            font-weight: 500;
        }

        .contact-item a:hover {
            color: var(--accent-gold) !important;
        }

        .signup-form {
            background: var(--soft-white);
            border-radius: 20px;
            padding: 2.5rem;
        }

        .signup-form input {
            padding: 1rem 1.25rem;
            border: 2px solid var(--beige);
            border-radius: 10px;
            font-size: 1rem;
            width: 100%;
            background: var(--cream);
        }

        .signup-form input:focus {
            outline: none;
            border-color: var(--forest-green);
            background: var(--soft-white);
        }

        .signup-form button {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--forest-green), var(--deep-green));
            color: var(--soft-white);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        /* Footer */
        footer {
            background: var(--deep-green);
            color: var(--cream);
            padding: 3rem 5% 2rem;
            text-align: center;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .social-links a {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cream);
            text-decoration: none;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            background: var(--warm-brown);
            transform: translateY(-3px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                background: var(--soft-white);
                flex-direction: column;
                padding: 2rem;
                gap: 1.5rem;
                text-align: center;
                transform: translateY(-150%);
                transition: transform 0.3s ease;
            }
            .nav-links.active { transform: translateY(0); }
            .mobile-menu-btn { display: block; }
